# Harness 中间件栈规格配置
# 定义 Deep Agents 中间件的加载顺序与参数

harness:
  # ── 中间件加载顺序（列表顺序即为实例化顺序） ──
  middleware_order:
    - name: "TodoListMiddleware"
      module: "deepagents.middleware.todo"
      description: "规划工具 —— 管理任务列表"

    - name: "FilesystemMiddleware"
      module: "deepagents.middleware.filesystem"
      description: "文件系统操作 —— 读写 workspace 目录"
      config:
        root_dir: "./workspace"

    - name: "SummarizationMiddleware"
      module: "deepagents.middleware.summarization"
      description: "上下文压缩 —— 基于 Token 阈值触发摘要"
      config:
        token_threshold: "${loop.context_token_limit}"  # 引用 loop_spec.yaml

    - name: "HumanInTheLoopMiddleware"
      module: "deepagents.middleware.hitl"
      description: "人在回路 —— 对关键文件操作进行人工审批"
      config:
        approval_actions:
          - "write_file"
          - "edit_file"
          - "delete_file"

  # ── 检查点配置 ──
  checkpoint:
    table_name: "agentworks_checkpoints"
    db_path_env: "CHECKPOINT_DB_PATH"
    default_db_path: "./agentworks_checkpoints.db"
